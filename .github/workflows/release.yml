name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir dist
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dist/ggmm-linux-amd64     ./cmd/main.go
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o dist/ggmm-linux-arm64     ./cmd/main.go
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o dist/ggmm-darwin-amd64    ./cmd/main.go
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o dist/ggmm-darwin-arm64    ./cmd/main.go
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/ggmm-windows-amd64.exe ./cmd/main.go

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
